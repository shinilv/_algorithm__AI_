<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Mini Agent</title>
    <link rel="stylesheet" href="/static/style.css">
  </head>
  <body>
    <main class="app-shell">
      <header class="topbar">
        <div>
          <h1>Mini Agent</h1>
          <p>Local File QA Console</p>
        </div>
        <div class="topbar-actions">
          <span class="status" id="apiStatus">Checking API</span>
          <a class="docs-link" href="/docs" target="_blank" rel="noreferrer">API Docs</a>
        </div>
      </header>

      <section class="workspace">
        <form class="composer" id="chatForm">
          <div class="field">
            <label for="task">Task</label>
            <textarea id="task" name="task" rows="10" spellcheck="false">搜索项目里哪里定义了 ToolRegistry</textarea>
          </div>

          <div class="control-grid">
            <div class="field">
              <label for="backend">Backend</label>
              <select id="backend" name="backend">
                <option value="mock">mock</option>
                <option value="openai">openai</option>
              </select>
            </div>

            <div class="field">
              <label for="maxSteps">Max Steps</label>
              <input id="maxSteps" name="maxSteps" type="number" min="1" max="20" value="8">
            </div>
          </div>

          <label class="check-row" for="debug">
            <input id="debug" name="debug" type="checkbox">
            <span>Debug</span>
          </label>

          <div class="examples" aria-label="Example tasks">
            <button type="button" data-example="列出项目文件">列出项目文件</button>
            <button type="button" data-example="读取 README.md 文件">读取 README.md</button>
            <button type="button" data-example="搜索项目里哪里定义了 ToolRegistry">搜索 ToolRegistry</button>
          </div>

          <button class="submit-button" id="submitButton" type="submit">Run Agent</button>
        </form>

        <section class="result-panel" aria-live="polite">
          <div class="result-header">
            <div>
              <h2>Answer</h2>
              <p id="resultMeta">Waiting for a task</p>
            </div>
            <span class="pill" id="stepBadge">0 steps</span>
          </div>
          <pre id="answerOutput">结果会显示在这里。</pre>
          <div class="error" id="errorOutput" hidden></div>
        </section>
      </section>
    </main>

    <script src="/static/app.js"></script>
  </body>
</html>
